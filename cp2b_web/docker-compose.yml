services:
  # Development mode - hot reload
  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=/api
      - VITE_INVITE_TOKEN=palavra-secreta
    depends_on:
      - backend

  # Production mode - optimized build with Nginx
  prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgres://cp2b:cp2b@db:5432/cp2b
      - PORT=3001
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:5173
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=
      - SMTP_PASS=
      - SMTP_FROM=CP2b Forum Paulista <noreply@cp2b.org>
      - INVITE_TOKEN=palavra-secreta
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cp2b
      - POSTGRES_PASSWORD=cp2b
      - POSTGRES_DB=cp2b
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cp2b -d cp2b"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Test services (no backend / DB required) ──────────────────────────────

  # Run the full test suite once and exit.
  # Usage: docker-compose run --rm test
  test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run test:run"
    environment:
      - NODE_ENV=test
      - CI=true

  # Run tests in watch mode — re-runs automatically on every file save.
  # Usage: docker-compose run --rm test-watch
  test-watch:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm test"
    environment:
      - NODE_ENV=test
      - CI=false

  # Generate an HTML coverage report in ./coverage/
  # Usage: docker-compose run --rm test-coverage
  # Tip: open coverage/index.html in your browser to see which lines are tested.
  test-coverage:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run test:coverage"
    environment:
      - NODE_ENV=test
      - CI=true

volumes:
  postgres_data:
  uploads_data:
