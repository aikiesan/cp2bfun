# HTTP VirtualHost — receives traffic forwarded by Unicamp's reverse proxy (port 80 in)
<VirtualHost *:80>
    ServerName cp2b.unicamp.br
    ServerAlias www.cp2b.unicamp.br

    ServerAdmin admin@cp2b.unicamp.br

    # Document root for React frontend
    DocumentRoot /var/www/cp2b/frontend/dist

    # -----------------------------------------------------------------------
    # PILAR-2b georef webapp (FOSS4G, runs on localhost:8000)
    # Must be declared BEFORE the <Directory> block so mod_proxy takes
    # precedence over the SPA rewrite rules.
    # -----------------------------------------------------------------------
    ProxyPass /pilar2b http://localhost:8000/pilar2b
    ProxyPassReverse /pilar2b http://localhost:8000/pilar2b

    # Force correct forwarded headers so PILAR-2b generates https:// redirect
    # URLs even for requests arriving on plain HTTP from Unicamp's reverse proxy.
    <Location /pilar2b>
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "cp2b.unicamp.br"
    </Location>

    # Reverse proxy for backend API
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api

    # Reverse proxy for uploaded files
    ProxyPass /uploads http://localhost:3001/uploads
    ProxyPassReverse /uploads http://localhost:3001/uploads

    # Frontend directory configuration
    <Directory /var/www/cp2b/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # SPA routing: redirect all requests to index.html
        # EXCEPT API calls, uploads, and the PILAR-2b subpath
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/uploads/
        RewriteCond %{REQUEST_URI} !^/pilar2b
        RewriteRule . /index.html [L]
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache control for static assets
    <FilesMatch "\.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|eot|css|js)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # Don't cache HTML files
    <FilesMatch "\.(html)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </FilesMatch>

    # Enable gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/cp2b-error.log
    CustomLog ${APACHE_LOG_DIR}/cp2b-access.log combined
    LogLevel warn
</VirtualHost>


# HTTPS VirtualHost — direct browser connections (LAN users, port 443)
# Requires: sudo a2enmod ssl proxy proxy_http headers rewrite
<VirtualHost *:443>
    ServerName cp2b.unicamp.br
    ServerAlias www.cp2b.unicamp.br

    ServerAdmin admin@cp2b.unicamp.br
    DocumentRoot /var/www/cp2b/frontend/dist

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/cp2b.unicamp.br/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/cp2b.unicamp.br/privkey.pem

    # Modern SSL — disable old protocols
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder off
    SSLSessionTickets off

    # HSTS — enforce HTTPS for 2 years
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    # -----------------------------------------------------------------------
    # PILAR-2b georef webapp (FOSS4G, runs on localhost:8000)
    # -----------------------------------------------------------------------
    ProxyPass /pilar2b http://localhost:8000/pilar2b
    ProxyPassReverse /pilar2b http://localhost:8000/pilar2b

    # For direct HTTPS connections (LAN), we are the TLS terminator so we must
    # explicitly set the forwarded headers for PILAR-2b's redirect generation.
    <Location /pilar2b>
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Host "cp2b.unicamp.br"
    </Location>

    # Reverse proxy for backend API
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api

    # Reverse proxy for uploaded files
    ProxyPass /uploads http://localhost:3001/uploads
    ProxyPassReverse /uploads http://localhost:3001/uploads

    # Frontend directory configuration
    <Directory /var/www/cp2b/frontend/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteCond %{REQUEST_URI} !^/api/
        RewriteCond %{REQUEST_URI} !^/uploads/
        RewriteCond %{REQUEST_URI} !^/pilar2b
        RewriteRule . /index.html [L]
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://cp2b.unicamp.br"

    # Cache control for static assets
    <FilesMatch "\.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|eot|css|js)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # Don't cache HTML files
    <FilesMatch "\.(html)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </FilesMatch>

    # Enable gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
        AddOutputFilterByType DEFLATE image/svg+xml
    </IfModule>

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/cp2b-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/cp2b-ssl-access.log combined
    LogLevel warn
</VirtualHost>


# HTTP → HTTPS redirect for direct connections (not via Unicamp proxy)
# The Unicamp reverse proxy handles its own HTTPS termination separately.
# This catches any browser that somehow hits port 80 on the VM directly.
#
# NOTE: Enable this only if the VM's port 80 is NOT the target of the
# Unicamp proxy's forwarding. If Unicamp proxy forwards to VM:80, this
# redirect would create an infinite loop. Leave commented if unsure.
#
